[tool.pytest.ini_options]
# The repo root holds the test_*.py files and is also the import root for the
# `pipeline` and `ui` packages, so keep collection here.
testpaths = ["."]
markers = [
    "api: test makes a live Anthropic API call (costs money). Skipped unless ANTHROPIC_API_KEY is set; run explicitly with `pytest -m api`.",
]

[tool.ruff.lint.per-file-ignores]
# run_evals.py deliberately inserts the repo root onto sys.path before it can
# import the `pipeline` package, so its imports legitimately follow that
# bootstrap. Scope the E402 exemption to this file only.
"evals/run_evals.py" = ["E402"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
# Non-strict on purpose. The code carries real type information (Pydantic
# models throughout the pipeline, typed function signatures), and CI runs
# `mypy pipeline ui app.py` as a hard gate — the step blocks the build on any
# error. Non-strict flags (no disallow-untyped-defs, etc.) keep the
# gradually-typed UI code passing; tighten later.
follow_imports = "silent"
exclude = ["venv/"]
