[theme]
# Editorial palette — kept in sync with the design tokens in app.py.
primaryColor = "#8b1d2c"            # oxblood accent (--accent-600)
backgroundColor = "#fafaf7"         # warm page paper (--surface-0)
secondaryBackgroundColor = "#ffffff"  # cards / widgets (--surface-1)
textColor = "#0e0e0c"               # primary ink (--text-primary)
font = "sans serif"

[server]
headless = true
